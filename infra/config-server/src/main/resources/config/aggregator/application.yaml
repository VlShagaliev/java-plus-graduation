server:
  port: 0

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: aggregator
    auto-offset-reset: earliest

aggregator:
  kafka:
    topic:
      eventsSimilarity: stats.events-similarity.v1
      userActions: stats.user-actions.v1

recommendation:
  weights:
    view: 0.4
    register: 0.8
    like: 1.0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always