server:
  port: 0

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

aggregator:
  producer-properties:
    bootstrap.servers: localhost:9092
  snapshot-topic: stats.user-actions.v1
  sensor-topic:
    - stats.events-similarity.v1
  consumer-properties:
    bootstrap.servers: localhost:9092

recommendation:
  weights:
    view: 0.4
    register: 0.8
    like: 1.0