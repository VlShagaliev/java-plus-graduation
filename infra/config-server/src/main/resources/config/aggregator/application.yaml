server:
  port: 0

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: aggregator

aggregator:
  kafka:
    topic:
      user-actions: stats.user-actions.v1
      event-similarity: stats.events-similarity.v1


recommendation:
  weights:
    view: 0.4
    register: 0.8
    like: 1.0