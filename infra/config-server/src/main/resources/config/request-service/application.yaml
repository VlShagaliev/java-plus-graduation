server:
  port: 0

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/request-db
    username: "postgres"
    password: "824322"
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: true
  sql:
    init:
      mode: never
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 1000
            readTimeout: 2000

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

grpc:
  client:
    collector:
      address: discovery:///collector
      negotiationType: PLAINTEXT
      enableKeepAlive: true
      keepAliveWithoutCalls: true